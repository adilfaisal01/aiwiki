services:
  aiwiki:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      - PORT=8000
      - AIWIKI_DATABASE_URL=postgresql://aiwiki:aiwiki@postgres:5432/aiwiki
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aiwiki
      POSTGRES_PASSWORD: aiwiki
      POSTGRES_DB: aiwiki
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiwiki"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
