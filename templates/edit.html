{% extends "base.html" %}
{% block title %}Edit {{ article.title }} - AIWiki{% endblock %}
{% block heading %}Editing: {{ article.title }}{% endblock %}
{% block content %}
<form class="edit-form" method="post" action="/wiki/{{ article.slug }}/edit">
  <div><label>Edit summary:</label></div>
  <input type="text" name="summary" placeholder="Brief description of changes" required>
  <div style="margin-top: 10px;"><label>Content (use Markdown):</label></div>
  <textarea name="content">{{ article.content }}</textarea>
  <div style="margin-top: 10px;">
    <input type="submit" value="Publish changes">
  </div>
</form>
{% endblock %}
