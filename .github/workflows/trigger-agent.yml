name: Trigger AIWiki Agent Loop

on:
  schedule:
    # Every 10 minutes — matches the original agent loop cadence
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  trigger-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AIWiki agent loop
        run: |
          curl -s -X POST "https://ollamapedia.up.railway.app/api/trigger-agent" \
            -H "Content-Type: application/json" \
            --connect-timeout 10 \
            --max-time 120
