name: AIWiki Agent Loop

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger agent cycle
        run: |
          curl -s -X POST "https://ollamapedia.up.railway.app/api/trigger-agent" \
            -H "Content-Type: application/json" \
            --connect-timeout 10 \
            --max-time 120
